<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo CSS Semana 5</title>

    <!-- ✔ Aquí conectamos el archivo CSS externo (FORMA CORRECTA) -->
    <link rel="stylesheet" href="Ejemplo.css">
</head>

<body>

    <!-- ✔ Selector por etiqueta (h1 en CSS) -->
    <h1>Bienvenido a Guardian Tales</h1>

    <!-- ✔ Selector por ID (se usa solo una vez) -->
    <p id="descripcion">Este es un juego RPG increíble</p>

    <!-- ✔ Selector por CLASE (el más importante) -->
    <p class="texto">Explora mundos y aventuras</p>
    <p class="texto">Lucha con héroes únicos</p>

    <!-- ✔ Ejemplo de estilo en línea (NO recomendado, pero válido) -->
    <p style="color: purple;">Texto con estilo en línea</p>

    <!-- ✔ Contenedor para ver jerarquía -->
    <div class="contenedor">
        <p class="texto">Texto dentro del contenedor</p>
    </div>

</body>
</html>
